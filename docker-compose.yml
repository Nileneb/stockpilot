services:
  postgres:
    image: postgres:16-alpine
    container_name: stockpilot-postgres
    environment:
      POSTGRES_USER: stockpilot
      POSTGRES_PASSWORD: stockpilot
      POSTGRES_DB: stockpilot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "stockpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
