<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Stockpilot — Mehrmandanten-Bestandsverwaltung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
  <header class="px-6 py-4 flex justify-between items-center border-b border-slate-700">
    <h1 class="text-xl font-semibold">Stockpilot</h1>
    <nav class="text-sm space-x-4">
      <a href="/admin/login/" class="hover:text-white">Login</a>
      <a href="/signup/" class="px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500">Organisation anlegen</a>

  </header>
  <main class="max-w-2xl mx-auto px-6 py-16 space-y-6">
    <h2 class="text-3xl font-bold">Bestandserfassung per Foto, pro Mandant.</h2>

    <p>
      <a href="/signup/" class="inline-block px-5 py-2.5 rounded bg-emerald-600 hover:bg-emerald-500">
