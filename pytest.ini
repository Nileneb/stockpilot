[pytest]
DJANGO_SETTINGS_MODULE = stockpilot.settings.dev
python_files = tests.py test_*.py *_tests.py
testpaths = tests apps
# Integration tests load real PyTorch + Ultralytics YOLO; they're heavy
# enough to have caused PC crashes during local runs, so we skip them by
# default. Run them explicitly with `pytest -m integration` when ready.
addopts = -ra --strict-markers -m "not integration"
markers =
    integration: hits real ML model — heavy (PyTorch + YOLO load), opt-in only
